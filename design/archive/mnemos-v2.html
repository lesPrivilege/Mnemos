<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Mnemos · v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Light · warm parchment */
  --bg:            oklch(96.5% 0.012 80);
  --bg-card:       oklch(99% 0.006 80);
  --bg-raised:     oklch(94% 0.016 80);
  --bg-sunken:     oklch(92.5% 0.018 80);
  --border:        oklch(86% 0.018 80);
  --border-soft:   oklch(91% 0.015 80);
  --border-strong: oklch(72% 0.025 80);
  --ink:           oklch(22% 0.022 80);
  --ink-2:         oklch(48% 0.020 80);
  --ink-3:         oklch(66% 0.014 80);
  --ink-4:         oklch(78% 0.012 80);
  --accent:        oklch(56% 0.13 60);          /* ochre */
  --accent-soft:   oklch(94% 0.038 60);
  --accent-line:   oklch(78% 0.07 60);
  --teal:          oklch(50% 0.09 195);          /* answer / reading */
  --teal-soft:     oklch(94% 0.025 195);
  --good:          oklch(54% 0.11 155);
  --good-soft:     oklch(94% 0.030 155);
  --warn:          oklch(58% 0.13 70);
  --warn-soft:     oklch(94% 0.035 70);
  --danger:        oklch(54% 0.16 28);
  --danger-soft:   oklch(94% 0.030 28);

  --shadow-sm:     0 1px 2px oklch(22% 0.02 80 / 0.05);
  --shadow-md:     0 1px 3px oklch(22% 0.02 80 / 0.06), 0 6px 24px oklch(22% 0.02 80 / 0.05);
  --shadow-lg:     0 4px 12px oklch(22% 0.02 80 / 0.08), 0 16px 40px oklch(22% 0.02 80 / 0.08);

  --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 22px;

  --font-zh:    'Noto Serif SC', 'Songti SC', Georgia, serif;
  --font-disp:  'Instrument Serif', 'Noto Serif SC', Georgia, serif;
  --font-ui:    'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:  'JetBrains Mono', ui-monospace, monospace;
}

:root.dark {
  --bg:            oklch(15% 0.012 250);
  --bg-card:       oklch(19% 0.014 250);
  --bg-raised:     oklch(23% 0.014 250);
  --bg-sunken:     oklch(12% 0.012 250);
  --border:        oklch(28% 0.014 250);
  --border-soft:   oklch(24% 0.012 250);
  --border-strong: oklch(40% 0.018 250);
  --ink:           oklch(94% 0.008 80);
  --ink-2:         oklch(72% 0.012 80);
  --ink-3:         oklch(54% 0.012 80);
  --ink-4:         oklch(40% 0.010 80);
  --accent:        oklch(72% 0.13 65);
  --accent-soft:   oklch(28% 0.06 65);
  --accent-line:   oklch(42% 0.10 65);
  --teal:          oklch(72% 0.10 195);
  --teal-soft:     oklch(26% 0.05 195);
  --good:          oklch(72% 0.13 155);
  --good-soft:     oklch(24% 0.05 155);
  --warn:          oklch(75% 0.13 75);
  --warn-soft:     oklch(26% 0.05 75);
  --danger:        oklch(70% 0.15 28);
  --danger-soft:   oklch(26% 0.06 28);
  --shadow-sm:     0 1px 2px #0006;
  --shadow-md:     0 1px 3px #0007, 0 6px 24px #0005;
  --shadow-lg:     0 4px 12px #0009, 0 16px 40px #0007;
}

html, body { height: 100%; }
body {
  background: var(--bg-sunken);
  color: var(--ink);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; }
input, textarea { font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }
::-webkit-scrollbar { width: 0; height: 0; }

/* ─────── Stage / phone shell ─────── */
.stage {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr;
  gap: 28px;
  padding: 28px 16px 60px;
  background:
    radial-gradient(1200px 600px at 50% -10%, oklch(94% 0.03 60 / .35), transparent 60%),
    var(--bg-sunken);
}
:root.dark .stage {
  background:
    radial-gradient(1200px 600px at 50% -10%, oklch(28% 0.04 250 / .45), transparent 60%),
    var(--bg-sunken);
}
.stage-inner {
  max-width: 1320px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.stage-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 24px; padding: 0 8px;
}
.stage-title {
  font-family: var(--font-disp);
  font-size: 38px;
  line-height: 1;
  color: var(--ink);
  letter-spacing: -0.01em;
  font-weight: 400;
}
.stage-title em {
  font-style: italic;
  color: var(--accent);
}
.stage-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-top: 8px;
}
.stage-controls {
  display: flex; gap: 8px; align-items: center;
}
.stage-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 11px; border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  font-size: 12px;
  color: var(--ink-2);
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
}
.stage-toggle.active { color: var(--ink); background: var(--bg-card); border-color: var(--border-strong); }
.stage-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, 360px);
  gap: 28px 32px;
  justify-content: center;
  align-items: start;
  padding: 8px;
}
.frame-wrap { display: flex; flex-direction: column; gap: 10px; align-items: center; }
.frame-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  display: flex; gap: 8px; align-items: center;
}
.frame-label .num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px;
  border-radius: 4px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--ink-2);
  font-size: 10px;
}

/* Phone bezel */
.phone {
  width: 360px; height: 740px;
  background: var(--bg);
  border-radius: 38px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
  isolation: isolate;
}
.phone::before {
  content:""; position:absolute; top: 8px; left: 50%; transform:translateX(-50%);
  width: 96px; height: 22px; background: var(--ink); opacity: .9;
  border-radius: 999px; z-index: 5;
}
:root.dark .phone::before { background: #000; }
.phone-status {
  position: absolute; top: 0; left: 0; right: 0; height: 38px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 22px 0;
  font-family: var(--font-mono); font-size: 12px; font-weight: 600;
  color: var(--ink); z-index: 6;
}
.phone-status .right { display:flex; gap:5px; align-items:center; }
.phone-screen {
  position: absolute; inset: 0;
  padding-top: 38px;
  overflow-y: auto; overflow-x: hidden;
  background: var(--bg);
  display: flex; flex-direction: column;
  scrollbar-width: none;
}

/* ─────── Top bar inside screen ─────── */
.topbar {
  height: 52px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px;
  border-bottom: 1px solid var(--border-soft);
  background: var(--bg);
  position: sticky; top: 0; z-index: 4;
  backdrop-filter: blur(12px);
}
.topbar h1 {
  font-family: var(--font-disp);
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -0.01em;
  color: var(--ink);
  display: flex; align-items: center; gap: 10px;
}
.topbar h1.zh { font-family: var(--font-zh); font-weight: 500; font-size: 17px; letter-spacing: 0; }
.tb-actions { display: flex; gap: 4px; align-items: center; }
.tb-btn {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 8px;
  color: var(--ink-2);
  transition: background 120ms, color 120ms;
}
.tb-btn:hover { background: var(--bg-raised); color: var(--ink); }
.tb-btn.danger { color: var(--danger); }
.tb-back {
  font-family: var(--font-mono); font-size: 18px; line-height: 1;
  color: var(--ink-2); width: 28px;
}
.tb-text {
  font-size: 13px; color: var(--ink-2); font-family: var(--font-ui);
  padding: 0 6px;
}

/* ─────── Mark / Logo ─────── */
.mark {
  width: 22px; height: 22px;
  position: relative; display: inline-block;
}
.mark svg { width: 100%; height: 100%; display: block; }

/* ─────── Sections ─────── */
.scr { padding: 18px 18px 32px; display: flex; flex-direction: column; gap: 16px; }
.section-title {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after {
  content: ""; flex: 1; height: 1px; background: var(--border-soft);
}

/* Stats hero */
.hero {
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-lg);
  padding: 18px 18px 16px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content:""; position: absolute; top:0; left: 18px; right: 18px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-line), transparent);
}
.hero-row {
  display: grid; grid-template-columns: 1fr 1px 1fr 1px 1fr;
  gap: 12px; align-items: stretch;
}
.hero-col {
  display: flex; flex-direction: column; gap: 4px; align-items: flex-start;
}
.hero-col .num {
  font-family: var(--font-disp); font-size: 32px; line-height: 1;
  color: var(--ink); font-weight: 400; letter-spacing: -0.01em;
}
.hero-col .num.accent { color: var(--accent); }
.hero-col .label {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3);
  margin-top: 2px;
}
.hero-col .zh-label {
  font-family: var(--font-zh); font-size: 11px; color: var(--ink-2);
  margin-top: 1px;
}
.hero-divider { width: 1px; background: var(--border-soft); }

.hero-chart {
  margin-top: 14px;
  display: flex; align-items: flex-end; gap: 5px;
  height: 36px;
}
.hero-bar { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.hero-bar .b {
  width: 100%; min-height: 2px;
  background: var(--accent-soft);
  border-top: 1.5px solid var(--accent);
  border-radius: 2px 2px 0 0;
  transition: height 350ms cubic-bezier(.2,.8,.2,1);
}
.hero-bar.empty .b { background: transparent; border-top-color: var(--border); }
.hero-bar .day {
  font-family: var(--font-mono); font-size: 9px; color: var(--ink-3);
}
.hero-bar.today .b { background: var(--accent); border-top-color: var(--accent); }
.hero-bar.today .day { color: var(--accent); font-weight: 600; }

/* Streak chip */
.streak {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px 4px 8px;
  border-radius: 999px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-line);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.02em;
}
.streak svg { width: 12px; height: 12px; }

/* Deck card */
.deck {
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 14px 14px 14px 0;
  display: grid;
  grid-template-columns: 56px 1fr auto;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: transform 140ms, border-color 140ms, background 140ms;
  position: relative;
}
.deck:hover { border-color: var(--border); }
.deck:active { transform: scale(0.99); }
.deck-spine {
  height: 56px;
  margin-left: 14px;
  border-radius: 4px;
  position: relative;
  overflow: hidden;
}
.deck-spine::before {
  content:""; position:absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--accent);
  border-radius: 2px;
}
.deck-spine .glyph {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-zh);
  font-size: 26px;
  color: var(--ink-2);
  font-weight: 500;
  padding-left: 6px;
}
.deck-spine.h0 .glyph { color: oklch(45% 0.10 60); }
.deck-spine.h1 .glyph { color: oklch(45% 0.10 195); }
.deck-spine.h2 .glyph { color: oklch(45% 0.10 155); }
.deck-spine.h3 .glyph { color: oklch(45% 0.10 280); }
.deck-spine.h0::before { background: oklch(60% 0.13 60); }
.deck-spine.h1::before { background: oklch(60% 0.10 195); }
.deck-spine.h2::before { background: oklch(60% 0.11 155); }
.deck-spine.h3::before { background: oklch(60% 0.11 280); }
:root.dark .deck-spine.h0 .glyph { color: oklch(78% 0.11 60); }
:root.dark .deck-spine.h1 .glyph { color: oklch(78% 0.10 195); }
:root.dark .deck-spine.h2 .glyph { color: oklch(78% 0.11 155); }
:root.dark .deck-spine.h3 .glyph { color: oklch(78% 0.11 280); }

.deck-meta { min-width: 0; }
.deck-name {
  font-family: var(--font-zh);
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center; gap: 6px;
}
.deck-pin {
  color: var(--accent); font-size: 10px; line-height: 1;
}
.deck-stats {
  margin-top: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-3);
  display: flex; align-items: center; gap: 6px;
}
.deck-stats .due { color: var(--accent); font-weight: 600; }
.deck-stats .dot { color: var(--ink-4); }

.deck-cta {
  display: flex; align-items: center; gap: 6px;
}
.cta-review {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 11px;
  border-radius: 999px;
  background: var(--ink);
  color: var(--bg);
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font-ui);
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.cta-review .arrow { font-family: var(--font-mono); font-size: 12px; }
.cta-done {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--good-soft); color: var(--good);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.deck-pin-btn {
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--ink-3);
  border-radius: 6px;
}
.deck-pin-btn.on { color: var(--accent); }
.deck-pin-btn:hover { background: var(--bg-raised); }

/* List header row */
.list-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 4px;
}
.list-head .count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-3);
}

/* Bottom action bar (Home) */
.bottom-actions {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-top: 8px;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 14px;
  border-radius: var(--r-md);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  border: 1px solid transparent;
  transition: transform 100ms, background 140ms, border-color 140ms, color 140ms;
  white-space: nowrap;
  line-height: 1;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--ink); color: var(--bg); }
.btn-primary:hover { background: var(--ink-2); }
.btn-ghost { background: var(--bg-card); border-color: var(--border); color: var(--ink); }
.btn-ghost:hover { background: var(--bg-raised); }
.btn-outline { background: transparent; border-color: var(--border); color: var(--ink-2); }
.btn-outline:hover { background: var(--bg-card); color: var(--ink); }
.btn-accent { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-line); }
.btn-accent:hover { background: var(--accent); color: white; }
.btn-danger { background: transparent; color: var(--danger); border-color: color-mix(in oklch, var(--danger) 30%, transparent); }
.btn-sm { padding: 7px 11px; font-size: 12px; border-radius: 8px; }
.btn-block { width: 100%; }

/* ─────── DeckDetail ─────── */
.dd-head {
  padding: 18px 18px 8px;
  display: flex; flex-direction: column; gap: 6px;
}
.dd-meta {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--ink-3); letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 8px;
}
.dd-meta .sep { color: var(--ink-4); }
.dd-name {
  font-family: var(--font-zh);
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--ink);
  line-height: 1.2;
}
.dd-progress {
  margin-top: 6px;
  height: 6px;
  background: var(--bg-raised);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}
.dd-progress .bar { position: absolute; left:0; top:0; bottom:0; background: var(--accent); border-radius: 3px; }
.dd-progress-row {
  margin-top: 8px;
  display: flex; justify-content: space-between;
  font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);
}

/* Primary CTA + secondary cluster */
.dd-cta {
  margin: 4px 18px 0;
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.dd-cta-main {
  grid-column: 1 / -1;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-radius: var(--r-md);
  background: var(--ink);
  color: var(--bg);
}
.dd-cta-main .left { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
.dd-cta-main .lead {
  font-family: var(--font-disp); font-size: 22px; line-height: 1;
}
.dd-cta-main .lead .num {
  font-family: var(--font-mono); font-weight: 500; font-size: 18px; margin-right: 6px;
}
.dd-cta-main .sub {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.14em; text-transform: uppercase;
  opacity: 0.6;
}
.dd-cta-main .arr {
  font-family: var(--font-mono); font-size: 22px;
}

.dd-secondary {
  margin: 0 18px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  padding: 6px;
  border-radius: var(--r-md);
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
}
.dd-action {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 4px 8px;
  border-radius: 8px;
  color: var(--ink-2);
  transition: background 120ms, color 120ms;
}
.dd-action:hover { background: var(--bg-raised); color: var(--ink); }
.dd-action svg { width: 18px; height: 18px; }
.dd-action .lab {
  font-size: 10px; font-weight: 500; letter-spacing: 0.02em;
  font-family: var(--font-ui);
}

/* Filters */
.filters {
  margin: 4px 18px 0;
  display: flex; gap: 6px; align-items: center;
}
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  font-size: 12px;
  color: var(--ink-2);
  font-family: var(--font-ui);
  transition: all 120ms;
}
.chip.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }

.ch-row:hover { background: var(--bg-raised); }
.ch-caret {

  font-family: var(--font-mono); font-size: 10px;
}
.ch-caret.open { transform: rotate(90deg); }
.ch-name {
  font-family: var(--font-zh); font-size: 14px; font-weight: 500;
  color: var(--ink); flex: 1;
}
.ch-count {
  font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);
}

.sec-row {

}
.sec-row:hover { background: var(--bg-raised); }
.sec-row .ch-name { font-size: 13px; font-weight: 400; color: var(--ink-2); font-family: var(--font-zh); }

.card-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px 6px 40px;
  font-size: 13px;
  border-radius: 6px;
  font-family: var(--font-zh);
  color: var(--ink);
  position: relative;
}
.card-row:hover { background: var(--bg-raised); }
.card-row::before {
  content:""; position:absolute; left: 28px; top: 50%; width: 6px; height: 1px;
  background: var(--ink-4);
}
.card-row .front { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-row .star { color: var(--accent); font-size: 11px; }
.card-row .badge {
  font-family: var(--font-mono); font-size: 9px;
  padding: 1px 5px; border-radius: 3px;
  border: 1px solid var(--border);
  color: var(--ink-3);
  letter-spacing: 0.04em;
}

/* ─────── Review screen ─────── */
.rv-progress {
  position: relative;
  height: 4px;
  background: var(--bg-raised);
}
.rv-progress .bar { height: 100%; background: var(--accent); transition: width 200ms; }
.rv-progress .ticks { position: absolute; inset: 0; display: flex; }
.rv-progress .tick { flex: 1; border-right: 1px solid var(--bg); }
.rv-progress .tick:last-child { border-right: 0; }

.rv-meta {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px 0;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-3);
}
.rv-meta .crumb {
  font-family: var(--font-zh);
  color: var(--ink-2);
  font-size: 12px;
  display: flex; align-items: center; gap: 6px;
}
.rv-meta .crumb .div { color: var(--ink-4); }
.rv-meta .pos { letter-spacing: 0.06em; }
.rv-meta .pos .now { color: var(--ink); font-weight: 600; }

.rv-card-wrap {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  padding: 18px;
  gap: 14px;
}

  flex: 1; min-height: 0;
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-lg);
  padding: 22px 20px 20px;

  box-shadow: var(--shadow-sm);
  cursor: pointer;
}
.rv-card .star {
  position: absolute; top: 14px; right: 14px;
  width: 26px; height: 26px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--ink-3);
  font-size: 16px;
}
.rv-card .star.on { color: var(--accent); }
.rv-card .corner {
  position: absolute; top: 14px; left: 16px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  text-transform: uppercase;
  display: flex; gap: 6px; align-items: center;
}
.rv-card .corner .num {
  color: var(--accent); font-weight: 600; letter-spacing: 0.02em;
}
.rv-card .ornament {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  width: 32px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--ink-4), transparent);
}
.rv-card .body {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
  gap: 14px;
  padding: 8px;
}
.rv-card .front-q {
  font-family: var(--font-zh);
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.5;
  letter-spacing: 0.02em;
}
.rv-card .front-en {
  font-family: var(--font-disp);
  font-style: italic;
  color: var(--ink-3);
  font-size: 14px;
}
.rv-card .back-a {
  font-family: var(--font-zh);
  font-size: 16px;
  line-height: 1.85;
  color: var(--teal);
  text-align: left;
  letter-spacing: 0.01em;
  align-self: stretch;
}
.rv-card .back-a strong { color: var(--ink); font-weight: 600; }
.rv-card .divider-srs {
  width: 100%; padding: 0 8px;
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-mono); font-size: 9px;
  color: var(--ink-3); letter-spacing: 0.18em; text-transform: uppercase;
}
.rv-card .divider-srs::before, .rv-card .divider-srs::after {
  content:""; flex: 1; height: 1px; background: var(--border-soft);

.rv-flip-hint {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-3);

.rate {

.rate-btn {

  border: 1px solid;
  font-family: var(--font-ui);
  font-weight: 500;
  font-size: 13px;

.rate-again { background: var(--danger-soft); color: var(--danger); border-color: color-mix(in oklch, var(--danger) 22%, transparent); }
.rate-hard  { background: var(--warn-soft);   color: var(--warn);   border-color: color-mix(in oklch, var(--warn) 22%, transparent); }
.rate-good  { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-line); }
.rate-easy  { background: var(--good-soft);   color: var(--good);   border-color: color-mix(in oklch, var(--good) 22%, transparent); }

.flip-card { perspective: 1400px; }
.flip-inner {
  width: 100%; height: 100%;

}
.flip-inner.flipped { transform: rotateY(180deg); }
.flip-face {
  position: absolute; inset: 0;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  display: flex; flex-direction: column;
}
.flip-back-face { transform: rotateY(180deg); }

/* ─────── Browse ─────── */
.bw-card {
  flex: 1; min-height: 0;
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-lg);
  padding: 24px 20px;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  font-family: var(--font-zh);
  font-size: 20px;
  color: var(--ink);
  position: relative;
  cursor: pointer;
}
.bw-nav {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  padding: 0 18px 18px;
}

/* ─────── Import ─────── */
.import-card {

  font-size: 14px;
  font-weight: 500;

.import-card .sub {

.dropzone {

  border-radius: var(--r-md);
  padding: 22px 16px;

.dropzone:hover { border-color: var(--accent-line); background: var(--accent-soft); }
.dropzone .icon {

  color: var(--ink-2);
}
.dropzone .label {
  font-family: var(--font-zh); font-size: 13px; color: var(--ink);
}
.dropzone .ext {
  font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);
  letter-spacing: 0.08em;
}
.textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 12px;
  font-size: 13px;
  font-family: var(--font-zh);
  outline: none;

}
.textarea:focus { border-color: var(--accent); }

/* Preview list */
.preview-list { display: flex; flex-direction: column; gap: 6px; }
.preview-list .it {
  display: flex; gap: 8px;
  padding: 7px 10px;
  border-left: 2px solid var(--accent-line);
  background: var(--bg);
  border-radius: 0 6px 6px 0;
  font-family: var(--font-zh);
  font-size: 12px;
  color: var(--ink);
}
.preview-list .it .n { color: var(--ink-3); font-family: var(--font-mono); font-size: 10px; min-width: 18px; }

/* ─────── Settings ─────── */

  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);

}

  letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3);

.settings-card .ctl { display: flex; gap: 6px; }
.seg {
  display: inline-flex; padding: 3px;
  background: var(--bg-raised);
  border-radius: var(--r-sm);
  border: 1px solid var(--border-soft);
  width: 100%;

.seg button {
  flex: 1; padding: 7px 10px;
  font-size: 12px; font-weight: 500;
  border-radius: 6px;
  color: var(--ink-2);
}
.seg button.on { background: var(--bg-card); color: var(--ink); box-shadow: var(--shadow-sm); }
.kv-row {
  display: flex; justify-content: space-between; align-items: baseline;

  border-bottom: 1px dashed var(--border-soft);

.kv-row:last-child { border-bottom: 0; }

.kv-row .v { color: var(--ink); font-family: var(--font-mono); font-size: 12px; }

.done-grid .good  { color: var(--accent); background: var(--accent-soft); }

}

  background: var(--bg-card);

  border-radius: var(--r-lg);
  padding: 22px;

.spec .mono { font-family: var(--font-mono); font-size: 13px; color: var(--ink); }

/* Hide native spinners */
input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

/* ════════════════════════════════════════════════
   THE M MARK — original, no resemblance to other brands
   Constructed: trapezoidal frame with central serif spine
═══════════════════════════════════════════════ */
function MnemosMark({ size=22, color='currentColor', accent }) {
  const c = color;
  const a = accent || color;
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
      {/* Outer frame — squared M */}
      <path d="M10 52 L10 14 L20 14 L32 30 L44 14 L54 14 L54 52"
        stroke={c} strokeWidth="5" strokeLinecap="square" strokeLinejoin="miter" fill="none"/>
      {/* Inner accent — descending fold */}
      <path d="M22 24 L32 38 L42 24"
        stroke={a} strokeWidth="3" strokeLinecap="square" strokeLinejoin="miter" fill="none"/>
      {/* Foot serifs */}
      <rect x="6" y="50" width="12" height="4" fill={c}/>
      <rect x="46" y="50" width="12" height="4" fill={c}/>
    </svg>
  );
}

function MnemosMarkFull({ size=22, color='currentColor', accent }) {
  // App-icon variant: solid silhouette on rounded square
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
      <path d="M10 52 L10 14 L20 14 L32 30 L44 14 L54 14 L54 52"
        stroke={color} strokeWidth="5" strokeLinecap="square" strokeLinejoin="miter" fill="none"/>
      <path d="M22 24 L32 38 L42 24"
        stroke={accent || color} strokeWidth="3" strokeLinecap="square" strokeLinejoin="miter" fill="none"/>
      <rect x="6" y="50" width="12" height="4" fill={color}/>
      <rect x="46" y="50" width="12" height="4" fill={color}/>
    </svg>
  );
}

function AppIcon({ size=72, variant='light' }) {
  const isDark = variant === 'dark';
  const bg = isDark
    ? 'oklch(18% 0.02 250)'
    : 'oklch(96% 0.014 80)';
  const ink = isDark ? 'oklch(94% 0.008 80)' : 'oklch(22% 0.02 80)';
  const accent = 'oklch(62% 0.13 65)';
  const r = size * 0.224;
  return (
    <svg width={size} height={size} viewBox="0 0 256 256">
      <defs>
        <linearGradient id={`bg-${variant}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor={isDark ? 'oklch(22% 0.02 250)' : 'oklch(98% 0.012 80)'} />
          <stop offset="1" stopColor={bg} />
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="256" height="256" rx={r*4.5} fill={`url(#bg-${variant})`} />
      {/* faint key-pattern border */}
      <rect x="14" y="14" width="228" height="228" rx={r*4} fill="none" stroke={ink} strokeOpacity="0.08" strokeWidth="1.5"/>
      <g transform="translate(40, 56)">
        <path d="M0 144 L0 0 L36 0 L88 64 L140 0 L176 0 L176 144"
          stroke={ink} strokeWidth="18" strokeLinecap="square" strokeLinejoin="miter" fill="none"/>
        <path d="M40 36 L88 92 L136 36"
          stroke={accent} strokeWidth="12" strokeLinecap="square" strokeLinejoin="miter" fill="none"/>
        <rect x="-14" y="138" width="42" height="14" fill={ink}/>
        <rect x="148" y="138" width="42" height="14" fill={ink}/>
      </g>
    </svg>
  );
}

/* ════════════════════════════════════════════════
   STAGE-LEVEL THEME (controls light/dark of all phones at once)
═══════════════════════════════════════════════ */
function useTheme() {
  const [dark, setDark] = useState(false);

}

/* ════════════════════════════════════════════════
   ROUTER PER PHONE — each phone is independent
═══════════════════════════════════════════════ */
function PhoneRouter({ initial='home', presetState }) {
  const [route, setRoute] = useState(initial);
  const onNav = (r) => setRoute(r);
  switch (route) {
    case 'home':       return <HomeScreen onNav={onNav}/>;
    case 'home-empty': return <HomeEmptyScreen onNav={onNav}/>;
    case 'deck':       return <DeckDetailScreen onNav={onNav}/>;
    case 'review':     return <ReviewScreen onNav={onNav}/>;
    case 'review-back':return <ReviewScreen onNav={onNav} flipped={true}/>;
    case 'done':       return <DoneScreen onNav={onNav}/>;
    case 'browse':     return <BrowseScreen onNav={onNav}/>;
    case 'import':     return <ImportScreen onNav={onNav}/>;
    case 'import-preview': return <ImportScreen onNav={onNav} preview/>;
    case 'prompt':     return <PromptScreen onNav={onNav}/>;
    case 'settings':   return <SettingsScreen onNav={onNav} themeDark={document.documentElement.classList.contains('dark')} setThemeDark={(v)=>document.documentElement.classList.toggle('dark', v)}/>;
    default:           return <HomeScreen onNav={onNav}/>;
  }
}
