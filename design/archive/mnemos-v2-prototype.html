<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mnemos · v2.0 Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════════
   Mnemos v2 — Design tokens + base
══════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Light · warm parchment (hue 80) */
  --bg:            oklch(96.5% 0.012 80);
  --bg-card:       oklch(99% 0.006 80);
  --bg-raised:     oklch(94% 0.016 80);
  --bg-sunken:     oklch(92.5% 0.018 80);
  --border:        oklch(86% 0.018 80);
  --border-soft:   oklch(91% 0.015 80);
  --border-strong: oklch(72% 0.025 80);
  --ink:           oklch(22% 0.022 80);
  --ink-2:         oklch(48% 0.020 80);
  --ink-3:         oklch(66% 0.014 80);
  --ink-4:         oklch(78% 0.012 80);
  --accent:        oklch(56% 0.13 60);
  --accent-soft:   oklch(94% 0.038 60);
  --accent-line:   oklch(78% 0.07 60);
  --teal:          oklch(50% 0.09 195);
  --teal-soft:     oklch(94% 0.025 195);
  --teal-line:     oklch(78% 0.06 195);
  --good:          oklch(54% 0.11 155);
  --good-soft:     oklch(94% 0.030 155);
  --warn:          oklch(58% 0.13 70);
  --warn-soft:     oklch(94% 0.035 70);
  --danger:        oklch(54% 0.16 28);
  --danger-soft:   oklch(94% 0.030 28);
  --plum:          oklch(48% 0.10 320);

  /* Code syntax — light */
  --code-bg:       oklch(95% 0.012 80);
  --code-border:   oklch(89% 0.014 80);
  --tk-key:        oklch(48% 0.14 320);     /* keyword — plum */
  --tk-str:        oklch(48% 0.11 155);     /* string — moss */
  --tk-num:        oklch(54% 0.13 60);      /* number — ochre */
  --tk-com:        oklch(64% 0.020 80);     /* comment — muted */
  --tk-fn:         oklch(46% 0.11 240);     /* function — indigo */
  --tk-op:         oklch(36% 0.022 80);     /* operator — ink */

  --shadow-sm:     0 1px 2px oklch(22% 0.02 80 / 0.05);
  --shadow-md:     0 1px 3px oklch(22% 0.02 80 / 0.06), 0 6px 24px oklch(22% 0.02 80 / 0.05);
  --shadow-lg:     0 4px 12px oklch(22% 0.02 80 / 0.08), 0 16px 40px oklch(22% 0.02 80 / 0.08);

  --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 22px;

  --font-zh:    'Noto Serif SC', 'Songti SC', Georgia, serif;
  --font-disp:  'Instrument Serif', 'Noto Serif SC', Georgia, serif;
  --font-ui:    'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:  'JetBrains Mono', ui-monospace, monospace;
}

.phone-screen.dark {
  /* Dark · warm graphite (hue 35 — sienna ink, brand-cohesive) */
  --bg:            oklch(16% 0.014 250);
  --bg-card:       oklch(20% 0.016 250);
  --bg-raised:     oklch(24% 0.018 250);
  --bg-sunken:     oklch(13% 0.012 250);
  --border:        oklch(30% 0.018 250);
  --border-soft:   oklch(26% 0.014 250);
  --border-strong: oklch(42% 0.022 250);
  --ink:           oklch(95% 0.008 250);
  --ink-2:         oklch(76% 0.012 250);
  --ink-3:         oklch(58% 0.014 250);
  --ink-4:         oklch(42% 0.016 250);
  --accent:        oklch(74% 0.13 65);
  --accent-soft:   oklch(28% 0.06 50);
  --accent-line:   oklch(44% 0.10 60);
  --teal:          oklch(74% 0.10 195);
  --teal-soft:     oklch(26% 0.05 195);
  --teal-line:     oklch(44% 0.08 195);
  --good:          oklch(74% 0.13 155);
  --good-soft:     oklch(24% 0.05 155);
  --warn:          oklch(76% 0.13 75);
  --warn-soft:     oklch(26% 0.05 75);
  --danger:        oklch(72% 0.15 28);
  --danger-soft:   oklch(26% 0.06 28);
  --plum:          oklch(72% 0.12 320);

  --code-bg:       oklch(13% 0.012 250);
  --code-border:   oklch(26% 0.014 250);
  --tk-key:        oklch(74% 0.14 320);
  --tk-str:        oklch(74% 0.11 155);
  --tk-num:        oklch(76% 0.13 60);
  --tk-com:        oklch(54% 0.014 250);
  --tk-fn:         oklch(74% 0.11 240);
  --tk-op:         oklch(85% 0.010 250);

  --shadow-sm:     0 1px 2px #0008;
  --shadow-md:     0 1px 3px #0008, 0 6px 24px #0006;
  --shadow-lg:     0 4px 12px #000a, 0 16px 40px #0008;
}

html, body { height: 100%; }
body {
  background: oklch(92% 0.018 80);
  color: var(--stage-ink, #2D2920);
  font-family: var(--font-ui);
  font-feature-settings: "ss01", "cv11", "tnum";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; }
input, textarea { font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }
::-webkit-scrollbar { width: 0; height: 0; }
input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

/* ─────── Stage / canvas ─────── */
.stage {
  --stage-ink:       #2D2920;
  --stage-ink-2:     #4d4538;
  --stage-ink-3:     #7a6e5c;
  --stage-ink-4:     #a89b85;
  --stage-rule:      oklch(86% 0.018 80);
  --stage-rule-soft: oklch(89% 0.012 80);
  --stage-accent:    #B86A30;
  min-height: 100vh;
  padding: 36px 24px 80px;
  background:
    radial-gradient(1400px 500px at 50% -8%, oklch(94% 0.04 60 / 0.7), transparent 60%),
    radial-gradient(800px 400px at 50% 100%, oklch(96% 0.03 60 / 0.4), transparent 60%),
    oklch(92% 0.018 80);
  color: var(--stage-ink);
}
/* Brand header — book-cover style logo block */
.stage-head { max-width: 1800px; margin: 0 auto 48px; padding: 32px 8px 36px; position: relative; }
.stage-head::before, .stage-head::after { content: ""; position: absolute; left: 8px; right: 8px; height: 1px; background: linear-gradient(90deg, transparent, var(--stage-rule) 20%, var(--stage-rule) 80%, transparent); }
.stage-head::before { top: 18px; }
.stage-head::after { bottom: 18px; }
.brand-hero { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 18px 0; }
.brand-mark { color: #2D2920; }
.brand-mark svg { display: block; filter: drop-shadow(0 4px 16px oklch(72% 0.12 60 / 0.18)); }
.brand-name { font-family: var(--font-disp); font-size: 56px; line-height: 1; color: var(--stage-ink); letter-spacing: 0.005em; font-weight: 400; }
.brand-motto { font-family: var(--font-disp); font-style: italic; font-size: 18px; color: oklch(72% 0.12 60); letter-spacing: 0.04em; margin-top: -4px; }
.brand-divider { display: flex; align-items: center; gap: 14px; margin-top: 4px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.22em; color: var(--stage-ink-3); text-transform: uppercase; flex-wrap: nowrap; white-space: nowrap; }
.brand-divider .line { width: 38px; height: 1px; background: var(--stage-rule); }
.brand-divider .dot { color: oklch(72% 0.12 60); }
.brand-meta-row { display: flex; justify-content: center; gap: 56px; margin-top: 26px; flex-wrap: wrap; }
.brand-meta-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: var(--font-mono); font-size: 10px; color: var(--stage-ink-3); letter-spacing: 0.14em; text-transform: uppercase; }
.brand-meta-item .zh { font-family: var(--font-disp); font-size: 22px; color: var(--stage-ink); letter-spacing: 0.04em; text-transform: none; }
.brand-meta-item .en { color: oklch(58% 0.10 60); font-weight: 500; }
.brand-meta-item .desc { color: var(--stage-ink-3); font-family: var(--font-zh); font-size: 11px; letter-spacing: 0.04em; text-transform: none; margin-top: 2px; white-space: nowrap; }
.brand-corner-tl, .brand-corner-tr, .brand-corner-bl, .brand-corner-br { position: absolute; width: 18px; height: 18px; border: 1px solid var(--stage-rule); }
.brand-corner-tl { top: 12px; left: 2px; border-right: 0; border-bottom: 0; }
.brand-corner-tr { top: 12px; right: 2px; border-left: 0; border-bottom: 0; }
.brand-corner-bl { bottom: 12px; left: 2px; border-right: 0; border-top: 0; }
.brand-corner-br { bottom: 12px; right: 2px; border-left: 0; border-top: 0; }
.grid { max-width: 1800px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 36px 28px; justify-items: center; }

.section-marker { grid-column: 1/-1; margin: 18px 0 -12px; padding: 0 8px; display: flex; align-items: baseline; gap: 14px; }
.section-marker .num { font-family: var(--font-mono); font-size: 11px; color: var(--stage-ink-3); letter-spacing: 0.16em; }
.section-marker .ttl { font-family: var(--font-disp); font-size: 22px; color: var(--stage-ink); }
.section-marker .ttl em { color: oklch(72% 0.12 60); font-style: italic; }
.section-marker .line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--stage-rule), transparent); }
.section-marker .desc { font-family: var(--font-zh); font-size: 12px; color: var(--stage-ink-3); max-width: 320px; line-height: 1.6; }

/* ─────── Phone bezel ─────── */
.phone-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.phone-label-bar { display: flex; align-items: center; justify-content: space-between; width: 360px; padding: 0 4px 4px; }
.phone-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--stage-ink-3, #7a6e5c); display: flex; align-items: center; gap: 8px; }
.phone-label .num { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 4px; background: oklch(95% 0.018 80); border: 1px solid var(--stage-rule, oklch(86% 0.018 80)); color: var(--stage-ink-2, #4d4538); font-size: 10px; font-weight: 500; }
.phone-theme-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--stage-rule, oklch(86% 0.018 80)); background: oklch(96% 0.018 80); color: var(--stage-ink-2, #4d4538); font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 120ms; }
.phone-theme-btn:hover { border-color: var(--stage-ink-3, #7a6e5c); color: var(--stage-ink, #2D2920); }
.phone { width: 360px; height: 740px; background: #1a1a1a; border-radius: 52px; padding: 10px; position: relative; box-shadow: 0 0 0 0.5px #1a1a1a, 0 0 0 1px #2D2920, 0 30px 50px -16px oklch(40% 0.04 60 / 0.35), 0 12px 24px -10px oklch(40% 0.04 60 / 0.2); }
.phone-screen { width: 100%; height: 100%; border-radius: 42px; overflow: hidden; background: var(--bg); position: relative; }
/* Dynamic Island (iPhone 15+ style) */
.phone-notch { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 92px; height: 28px; background: #050505; border-radius: 999px; z-index: 20; box-shadow: inset 0 0 0 0.5px #1a1a1a; }
.phone-notch-dot { position: absolute; top: 50%; right: 9px; transform: translateY(-50%); width: 6px; height: 6px; border-radius: 50%; background: #141414; box-shadow: inset 0 0 0 0.5px #1f1f1f; }
/* status bar sits behind/around island */
.sb { padding-top: 16px !important; padding-left: 22px !important; padding-right: 22px !important; position: relative; z-index: 1; }
.phone-screen-inner { display: flex; flex-direction: column; height: 100%; background: var(--bg); position: relative; overflow: hidden; }
.phone-screen-scroll { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; display: flex; flex-direction: column; }

/* status bar */
.sb { display: flex; align-items: center; justify-content: space-between; padding: 8px 22px 2px; font-family: var(--font-mono); font-size: 11px; color: var(--ink); font-weight: 600; letter-spacing: 0.01em; flex-shrink: 0; }
.sb-right { display: flex; align-items: center; gap: 5px; }
.sb-right svg { display: block; }

/* topbar */
.topbar { min-height: 48px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; gap: 8px; background: var(--bg); position: relative; z-index: 4; }
.topbar h1 { font-family: var(--font-disp); font-weight: 400; font-size: 22px; letter-spacing: 0; color: var(--ink); display: flex; align-items: center; gap: 10px; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar h1.zh { font-family: var(--font-zh); font-weight: 500; font-size: 16px; }
.tb-actions { display: flex; gap: 2px; align-items: center; flex-shrink: 0; }
.tb-btn { width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--ink-2); transition: background 120ms, color 120ms; }
.tb-btn:hover { background: var(--bg-raised); color: var(--ink); }

/* buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 14px; border-radius: var(--r-md); font-family: var(--font-ui); font-size: 13px; font-weight: 500; border: 1px solid transparent; transition: transform 100ms, background 140ms, border-color 140ms, color 140ms; white-space: nowrap; line-height: 1; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--ink); color: var(--bg); }
.btn-ghost { background: var(--bg-card); border-color: var(--border); color: var(--ink); }
.btn-ghost:hover { background: var(--bg-raised); }
.btn-accent { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-line); }
.btn-block { width: 100%; }
.btn-sm { padding: 7px 11px; font-size: 12px; border-radius: 8px; }

/* chip */
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 999px; border: 1px solid var(--border); background: var(--bg-card); font-size: 12px; color: var(--ink-2); font-family: var(--font-ui); transition: all 120ms; }
.chip.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.chip:hover:not(.on) { border-color: var(--border-strong); color: var(--ink); }

/* tabs */
.tabs-head { display: flex; margin: 0 16px; background: var(--bg-raised); border-radius: var(--r-sm); border: 1px solid var(--border-soft); padding: 3px; }
.tabs-tab { flex: 1; padding: 8px 0; font-size: 13px; font-weight: 500; border-radius: 6px; color: var(--ink-3); display: flex; flex-direction: column; align-items: center; line-height: 1.2; gap: 1px; transition: color 180ms; }
.tabs-tab.on { color: var(--ink); background: var(--bg-card); box-shadow: var(--shadow-sm); }
.tabs-tab .zh { font-family: var(--font-zh); font-size: 14px; letter-spacing: 0.04em; }
.tabs-tab .en { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-4); font-weight: 500; }
.tabs-tab.on .en { color: var(--ink-3); }

/* section title */
.section-title { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.16em; color: var(--ink-3); text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
.section-title::after { content: ""; flex: 1; height: 1px; background: var(--border-soft); }

/* hero */
.hero { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--r-md); padding: 16px 14px 12px; display: flex; flex-direction: column; gap: 12px; position: relative; overflow: hidden; cursor: pointer; transition: border-color 140ms; }
.hero:hover { border-color: var(--border); }
.hero::before { content: ""; position: absolute; top: 0; left: 16px; right: 16px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-line), transparent); }
.hero-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.hero-head .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; }
.streak { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-mono); font-size: 11px; color: var(--accent); font-weight: 600; }
.hero-row { display: flex; align-items: flex-start; justify-content: space-around; gap: 4px; }
.hero-col { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1 1 0; min-width: 0; }
.hero .num { font-family: var(--font-disp); font-size: 36px; font-weight: 400; line-height: 1; color: var(--ink); font-feature-settings: "lnum","tnum"; letter-spacing: -0.01em; }
.hero .num.accent { color: var(--accent); }
.hero .num.teal { color: var(--teal); }
.hero .label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; }
.hero .zh-label { font-family: var(--font-zh); font-size: 11px; color: var(--ink-2); letter-spacing: 0.02em; }
.hero-divider { width: 1px; height: 48px; background: var(--border-soft); align-self: center; flex-shrink: 0; }
.hero-chart { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; min-height: 40px; padding: 0 2px; }
.hero-bar { position: relative; height: 36px; }
.hero-bar .b { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 16px; background: var(--accent-line); border-radius: 3px 3px 1px 1px; min-height: 2px; transition: height 400ms cubic-bezier(.2,.8,.2,1); }
.hero-bar.teal .b { background: var(--teal); }
.hero-bar.today .b { background: var(--accent); }
.hero-bar.empty .b { background: var(--border); }
.hero-bar .day { position: absolute; bottom: 0; left: 0; right: 0; text-align: center; font-family: var(--font-zh); font-size: 10px; line-height: 1.2; color: var(--ink-3); }
.hero-bar.today .day { color: var(--accent); font-weight: 600; }
.hero-tap-hint { position: absolute; top: 12px; right: 14px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; color: var(--ink-4); text-transform: uppercase; opacity: 0.7; }

/* deck card */
.deck { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--r-md); padding: 14px 14px 14px 0; display: grid; grid-template-columns: 56px minmax(0,1fr) auto; align-items: center; gap: 12px; cursor: pointer; transition: transform 140ms, border-color 140ms; position: relative; min-width: 0; }
.deck:hover { border-color: var(--border); }
.deck:active { transform: scale(0.99); }
.deck-spine { height: 56px; margin-left: 14px; border-radius: 4px; position: relative; overflow: hidden; }
.deck-spine::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 2px; }
.deck-spine .glyph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-zh); font-size: 26px; color: var(--ink-2); font-weight: 500; padding-left: 6px; }
.deck-spine.h0 .glyph { color: oklch(45% 0.10 60); }
.deck-spine.h1 .glyph { color: oklch(45% 0.10 195); }
.deck-spine.h2 .glyph { color: oklch(45% 0.10 155); }
.deck-spine.h3 .glyph { color: oklch(45% 0.10 280); }
.deck-spine.h0::before { background: oklch(60% 0.13 60); }
.deck-spine.h1::before { background: oklch(60% 0.10 195); }
.deck-spine.h2::before { background: oklch(60% 0.11 155); }
.deck-spine.h3::before { background: oklch(60% 0.11 280); }
.phone-screen.dark .deck-spine.h0 .glyph { color: oklch(78% 0.11 60); }
.phone-screen.dark .deck-spine.h1 .glyph { color: oklch(78% 0.10 195); }
.phone-screen.dark .deck-spine.h2 .glyph { color: oklch(78% 0.11 155); }
.phone-screen.dark .deck-spine.h3 .glyph { color: oklch(78% 0.11 280); }

.deck-meta { min-width: 0; }
.deck-name { font-family: var(--font-zh); font-size: 15px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px; }
.deck-pin { color: var(--accent); font-size: 10px; line-height: 1; }
.deck-stats { margin-top: 4px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); display: flex; align-items: center; gap: 6px; }
.deck-stats .due { color: var(--accent); font-weight: 600; }
.deck-stats .ok { color: var(--good); font-weight: 600; }
.deck-stats .dot { color: var(--ink-4); }

.deck-cta { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.cta-pill { display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px; border-radius: 999px; background: var(--ink); color: var(--bg); font-family: var(--font-zh); font-size: 12px; font-weight: 500; letter-spacing: 0.02em; transition: opacity 120ms, transform 120ms; }
.cta-pill:active { transform: scale(0.96); }
.cta-pill:hover { opacity: 0.85; }
.cta-pill .arr { font-family: var(--font-mono); font-size: 12px; }
.cta-pill.teal { background: var(--teal); }
.cta-done { width: 26px; height: 26px; border-radius: 50%; background: var(--good-soft); color: var(--good); display: inline-flex; align-items: center; justify-content: center; }

/* continue card extras */
.deck.continue .deck-spine::before { background: var(--ink-3); }
.deck.continue .deck-spine .glyph { color: var(--ink-2); font-family: var(--font-mono); font-size: 18px; }
.deck-dismiss { width: 26px; height: 26px; border-radius: 50%; color: var(--ink-3); display: inline-flex; align-items: center; justify-content: center; transition: background 120ms, color 120ms; }
.deck-dismiss:hover { background: var(--bg-raised); color: var(--ink); }
.deck-progress-tiny { width: 36px; height: 36px; position: relative; }

/* deck detail */
.dd-head { margin: 0 18px; display: flex; flex-direction: column; gap: 6px; padding-top: 6px; }
.dd-meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.dd-meta .sep { color: var(--ink-4); }
.dd-name { font-family: var(--font-zh); font-size: 22px; font-weight: 500; letter-spacing: 0; color: var(--ink); line-height: 1.25; }
.dd-progress { height: 6px; border-radius: 3px; background: var(--bg-raised); overflow: hidden; }
.dd-progress .bar { height: 100%; border-radius: 3px; background: var(--accent); transition: width 400ms; }
.dd-progress .bar.teal { background: var(--teal); }
.dd-progress-row { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.1em; margin-top: 4px; }
.dd-cta-main { width: 100%; padding: 14px 16px; border-radius: var(--r-md); background: var(--ink); color: var(--bg); display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow-sm); transition: transform 100ms, opacity 140ms; }
.dd-cta-main:active { transform: scale(0.98); }
.dd-cta-main.teal { background: var(--teal); }
.dd-cta-main.disabled { background: var(--bg-raised); color: var(--ink-3); }
.dd-cta-main .left { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
.dd-cta-main .lead { font-family: var(--font-zh); font-size: 15px; font-weight: 500; letter-spacing: 0.02em; }
.dd-cta-main .lead .num { font-family: var(--font-disp); font-weight: 400; font-size: 22px; margin-right: 4px; font-feature-settings: "lnum","tnum"; }
.dd-cta-main .sub { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; opacity: 0.65; font-weight: 500; text-transform: uppercase; }
.dd-cta-main .arr { font-family: inherit; font-size: 22px; line-height: 1; }
.dd-secondary { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 6px; padding: 6px; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--r-md); }
.dd-action { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 4px; border-radius: 8px; color: var(--ink-2); transition: background 120ms, color 120ms; }
.dd-action:hover { background: var(--bg-raised); color: var(--ink); }
.dd-action .lab { font-family: var(--font-zh); font-size: 11px; font-weight: 500; letter-spacing: 0.02em; }

/* outline */
.ch-row { display: flex; align-items: center; gap: 8px; padding: 8px 8px 8px 4px; border-radius: 6px; cursor: pointer; transition: background 110ms; }
.ch-row:hover { background: var(--bg-raised); }
.ch-caret { width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; color: var(--ink-3); transition: transform 180ms; font-family: var(--font-mono); font-size: 9px; }
.ch-caret.open { transform: rotate(90deg); }
.ch-name { font-family: var(--font-zh); font-size: 14px; font-weight: 500; color: var(--ink); flex: 1; }
.ch-count { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }
.sec-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px 6px 22px; border-radius: 6px; }
.sec-row .ch-name { font-size: 13px; font-weight: 400; color: var(--ink-2); }
.card-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px 8px 28px; border-radius: 6px; cursor: pointer; position: relative; transition: background 110ms; }
.card-row:hover { background: var(--bg-raised); }
.card-row .dot-bullet { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--ink-4); }
.card-row .front { font-family: var(--font-zh); font-size: 13px; color: var(--ink); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-row .star-on { color: var(--accent); }
.card-row .star-off { color: var(--ink-4); }

/* review screen */
.rv-progress { position: relative; height: 3px; background: var(--bg-raised); flex-shrink: 0; }
.rv-progress .bar { height: 100%; background: var(--accent); transition: width 200ms; }
.rv-progress .bar.teal { background: var(--teal); }
.rv-meta { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px 0; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }
.rv-meta .crumb { font-family: var(--font-zh); color: var(--ink-2); font-size: 12px; display: flex; align-items: center; gap: 6px; }
.rv-meta .crumb .div { color: var(--ink-4); }
.rv-meta .pos { letter-spacing: 0.06em; }
.rv-meta .pos .now { color: var(--ink); font-weight: 600; }
.rv-card-wrap { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 14px 18px; gap: 12px; }
.rv-card { flex: 1; min-height: 0; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--r-lg); padding: 22px 20px 26px; position: relative; display: flex; flex-direction: column; box-shadow: var(--shadow-sm); cursor: pointer; }
.rv-card .corner { position: absolute; top: 14px; left: 16px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; color: var(--ink-3); text-transform: uppercase; display: flex; gap: 6px; }
.rv-card .corner .num { color: var(--accent); font-weight: 600; letter-spacing: 0.02em; }
.rv-card .star-btn { position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: var(--ink-3); }
.rv-card .star-btn.on { color: var(--accent); }
.rv-card .ornament { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); width: 32px; height: 1px; background: linear-gradient(90deg, transparent, var(--ink-4), transparent); }
.rv-card .body { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 14px; padding: 30px 4px 18px; overflow-y: auto; align-items: center; justify-content: center; text-align: center; }
.rv-card.flipped .body { justify-content: flex-start; align-items: stretch; text-align: left; }
.rv-card .front-q { font-family: var(--font-zh); font-size: 20px; font-weight: 500; color: var(--ink); line-height: 1.55; letter-spacing: 0.02em; }
.rv-card .echo { font-family: var(--font-zh); font-size: 13px; color: var(--ink-3); padding: 8px 12px; border-left: 2px solid var(--border); background: var(--bg-raised); border-radius: 0 6px 6px 0; line-height: 1.6; }
.rv-card .reverso { width: 100%; display: flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 9px; color: var(--ink-3); letter-spacing: 0.22em; text-transform: uppercase; padding: 4px 0; }
.rv-card .reverso::before, .rv-card .reverso::after { content: ""; flex: 1; height: 1px; background: var(--border-soft); }
.rv-card .back-a { font-family: var(--font-zh); font-size: 15px; line-height: 1.85; color: var(--ink); }
.rv-card .back-a strong { color: var(--accent); font-weight: 600; }
.rv-card .back-a em { color: var(--teal); font-style: italic; }
.rv-flip-hint { text-align: center; font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.18em; text-transform: uppercase; }
.rate { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 0 18px 18px; flex-shrink: 0; }
.rate-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 12px 4px 10px; border-radius: var(--r-md); border: 1px solid; font-family: var(--font-ui); font-weight: 500; font-size: 13px; transition: transform 100ms; }
.rate-btn:active { transform: scale(0.96); }
.rate-btn .iv { font-family: var(--font-mono); font-size: 10px; opacity: 0.65; letter-spacing: 0.04em; font-weight: 500; }
.rate-again { background: var(--danger-soft); color: var(--danger); border-color: color-mix(in oklch, var(--danger) 22%, transparent); }
.rate-hard  { background: var(--warn-soft); color: var(--warn); border-color: color-mix(in oklch, var(--warn) 22%, transparent); }
.rate-good  { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-line); }
.rate-easy  { background: var(--good-soft); color: var(--good); border-color: color-mix(in oklch, var(--good) 22%, transparent); }

/* quiz */
.qa-card { flex: 1; min-height: 0; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--r-lg); padding: 22px 18px 18px; position: relative; display: flex; flex-direction: column; gap: 14px; box-shadow: var(--shadow-sm); overflow-y: auto; }
.qa-card .corner { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; color: var(--ink-3); text-transform: uppercase; display: flex; gap: 6px; }
.qa-card .corner .num { color: var(--accent); font-weight: 600; letter-spacing: 0.02em; }
.qa-stem { font-family: var(--font-zh); font-size: 16px; font-weight: 500; color: var(--ink); line-height: 1.65; letter-spacing: 0.02em; }
.qa-options { display: flex; flex-direction: column; gap: 8px; }
.qa-opt { display: flex; align-items: flex-start; gap: 10px; padding: 12px 12px; border-radius: var(--r-md); border: 1px solid var(--border-soft); background: var(--bg); font-family: var(--font-zh); font-size: 14px; color: var(--ink); cursor: pointer; transition: border-color 120ms, background 120ms, opacity 120ms; text-align: left; line-height: 1.5; }
.qa-opt:hover:not(:disabled) { border-color: var(--border-strong); }
.qa-opt:disabled { cursor: default; }
.qa-opt.picked { border-color: var(--accent); background: var(--accent-soft); }
.qa-opt.correct { border-color: var(--good); background: var(--good-soft); }
.qa-opt.wrong { border-color: var(--danger); background: var(--danger-soft); }
.qa-opt.faded { opacity: 0.45; }
.qa-mark { width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--ink-2); flex-shrink: 0; }
.qa-opt.picked .qa-mark { border-color: var(--accent); color: var(--accent); background: var(--bg-card); }
.qa-opt.correct .qa-mark { border-color: var(--good); color: var(--good); background: var(--bg-card); }
.qa-opt.wrong .qa-mark { border-color: var(--danger); color: var(--danger); background: var(--bg-card); }
.qa-text { flex: 1; }
.qa-explain { padding: 12px 14px; background: var(--bg-raised); border-radius: var(--r-sm); border-left: 3px solid var(--teal); font-family: var(--font-zh); font-size: 13px; line-height: 1.7; color: var(--ink-2); }
.qa-explain strong { color: var(--ink); }

/* search */
.search { margin: 0 16px; position: relative; }
.search input { width: 100%; padding: 9px 12px 9px 32px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-md); font-size: 13px; outline: none; transition: border-color 120ms; }
.search input:focus { border-color: var(--accent); }
.search input::placeholder { color: var(--ink-3); }
.search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--ink-3); }

/* settings */
.settings-card { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--r-md); padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.settings-card .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; }
.kv-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px dashed var(--border-soft); font-size: 13px; }
.kv-row:last-child { border-bottom: 0; }
.kv-row .k { color: var(--ink-2); font-family: var(--font-zh); font-size: 12px; }
.kv-row .v { color: var(--ink); font-family: var(--font-mono); font-size: 12px; }
.seg { display: inline-flex; padding: 3px; background: var(--bg-raised); border-radius: var(--r-sm); border: 1px solid var(--border-soft); width: 100%; }
.seg button { flex: 1; padding: 7px 10px; font-size: 12px; font-weight: 500; border-radius: 6px; color: var(--ink-2); display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
.seg button.on { background: var(--bg-card); color: var(--ink); box-shadow: var(--shadow-sm); }
.dropzone { border: 1.5px dashed var(--border); border-radius: var(--r-md); padding: 22px 16px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; background: var(--bg); transition: border-color 140ms, background 140ms; }
.dropzone:hover { border-color: var(--accent-line); background: var(--accent-soft); }
.dropzone .icon { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--ink-2); }
.dropzone .label { font-family: var(--font-zh); font-size: 13px; color: var(--ink); }
.dropzone .ext { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.08em; }
.textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 12px; font-size: 13px; font-family: var(--font-zh); outline: none; resize: none; min-height: 100px; transition: border-color 120ms; }
.textarea:focus { border-color: var(--accent); }

/* empty */
.empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 56px 24px; text-align: center; color: var(--ink-3); }
.empty .glyph { font-family: var(--font-disp); font-size: 60px; color: var(--ink-4); line-height: 1; }
.empty .msg { font-family: var(--font-zh); font-size: 14px; letter-spacing: 0.02em; }
.empty .motto { font-family: var(--font-disp); font-style: italic; font-size: 13px; color: var(--ink-3); margin-top: -4px; }

/* document row */
.doc-row { display: flex; align-items: center; gap: 10px; padding: 11px 8px 11px 22px; border-radius: 6px; cursor: pointer; position: relative; transition: background 110ms; border-bottom: 1px solid var(--border-soft); }
.doc-row:last-child { border-bottom: 0; }
.doc-row:hover { background: var(--bg-raised); }
.doc-row .doc-dot { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 6px; height: 6px; border-radius: 50%; background: var(--teal); opacity: 0.6; }
.doc-row .doc-dot.read { background: var(--ink-4); opacity: 1; }
.doc-row .doc-title { font-family: var(--font-zh); font-size: 13px; color: var(--ink); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.doc-row .doc-meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.06em; flex-shrink: 0; }
.doc-row .doc-fmt { font-family: var(--font-mono); font-size: 9px; padding: 2px 5px; border-radius: 3px; border: 1px solid var(--border); color: var(--ink-3); letter-spacing: 0.08em; flex-shrink: 0; }

/* reader */
.reader-prose { padding: 24px 28px 80px; width: 100%; max-width: 480px; margin: 0 auto; font-family: var(--font-zh); box-sizing: border-box; min-width: 0; }
.reader-prose h1 { font-family: var(--font-disp); font-size: 26px; font-weight: 400; color: var(--ink); line-height: 1.25; margin-bottom: 4px; letter-spacing: 0; }
.reader-prose .author { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 24px; padding-bottom: 14px; border-bottom: 1px solid var(--border-soft); }
.reader-prose h2 { font-family: var(--font-zh); font-size: 17px; font-weight: 600; color: var(--ink); margin-top: 26px; margin-bottom: 10px; letter-spacing: 0.02em; }
.reader-prose h2::before { content: "§ "; color: var(--accent); font-family: var(--font-disp); font-weight: 400; }
.reader-prose p { font-family: var(--font-zh); font-size: 15px; line-height: 1.95; color: var(--ink); margin-bottom: 14px; text-indent: 2em; letter-spacing: 0.01em; }
.reader-prose h2 + p { text-indent: 2em; }
.reader-prose blockquote { border-left: 3px solid var(--accent-line); padding: 4px 0 4px 14px; margin: 14px 0; color: var(--ink-2); font-style: italic; font-family: var(--font-zh); }
.reader-prose .hl { background: oklch(94% 0.06 80); padding: 1px 2px; border-bottom: 1.5px solid var(--accent); cursor: pointer; transition: background 200ms; }
.phone-screen.dark .reader-prose .hl { background: oklch(28% 0.06 60); }
.reader-prose .hl.flash { animation: hlFlash 600ms ease-out; }
@keyframes hlFlash { 0% { background: var(--accent); color: var(--bg); } 100% { background: oklch(94% 0.06 80); color: var(--ink); } }
.reader-prose code { font-family: var(--font-mono); font-size: 0.9em; background: var(--bg-raised); padding: 1px 5px; border-radius: 3px; color: var(--accent); }

/* code block syntax highlighting */
.code-block { background: var(--code-bg); border: 1px solid var(--code-border); border-radius: var(--r-md); padding: 14px 14px 14px 0; font-family: var(--font-mono); font-size: 11px; line-height: 1.75; color: var(--ink-2); overflow-x: auto; position: relative; max-width: 100%; min-width: 0; white-space: pre; }
.code-block > div { white-space: pre; }
.code-block-head { position: absolute; top: 0; right: 0; padding: 4px 10px 0; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; color: var(--ink-4); text-transform: uppercase; background: var(--code-bg); border-bottom-left-radius: 6px; border-left: 1px solid var(--code-border); border-bottom: 1px solid var(--code-border); }
.code-block .ln { display: inline-block; width: 28px; text-align: right; padding-right: 12px; color: var(--ink-4); user-select: none; }
.code-block .tk-key { color: var(--tk-key); font-weight: 500; }
.code-block .tk-str { color: var(--tk-str); }
.code-block .tk-num { color: var(--tk-num); }
.code-block .tk-com { color: var(--tk-com); font-style: italic; }
.code-block .tk-fn  { color: var(--tk-fn); }
.code-block .tk-op  { color: var(--tk-op); }

/* reader chrome (top + bottom bars) */
.rd-topbar { position: absolute; top: 0; left: 0; right: 0; height: 56px; padding: 16px 14px 0; display: flex; align-items: center; gap: 8px; background: linear-gradient(180deg, var(--bg) 70%, transparent); z-index: 6; transition: transform 240ms cubic-bezier(.2,.8,.2,1), opacity 240ms; }
.rd-topbar.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
.rd-topbar .ttl { font-family: var(--font-zh); font-size: 14px; font-weight: 500; color: var(--ink); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rd-toolbar { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 2px; padding: 6px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 999px; box-shadow: var(--shadow-md); z-index: 6; transition: transform 240ms cubic-bezier(.2,.8,.2,1), opacity 240ms; backdrop-filter: blur(12px); }
.rd-toolbar.hidden { transform: translateX(-50%) translateY(160%); opacity: 0; pointer-events: none; }
.rd-tool { width: 38px; height: 38px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; color: var(--ink-2); transition: background 120ms, color 120ms; }
.rd-tool:hover { background: var(--bg-raised); color: var(--ink); }
.rd-tool.on { background: var(--ink); color: var(--bg); }
.rd-progress-pill { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px; border-radius: 999px; background: var(--bg-card); border: 1px solid var(--border-soft); font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.06em; z-index: 5; }
.rd-progress-pill .bar-mini { width: 50px; height: 3px; border-radius: 2px; background: var(--bg-raised); overflow: hidden; }
.rd-progress-pill .bar-mini .fill { height: 100%; background: var(--accent); }
.rd-settings-row { position: absolute; bottom: 64px; left: 16px; right: 16px; padding: 12px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-md); box-shadow: var(--shadow-md); z-index: 5; display: flex; flex-direction: column; gap: 10px; }
.rd-settings-row .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--ink-3); letter-spacing: 0.16em; text-transform: uppercase; }
.rd-settings-row .row { display: flex; align-items: center; gap: 8px; }
.rd-settings-row .row .seg { flex: 1; }

/* reader side panel */
.rd-panel { position: absolute; top: 0; left: 0; bottom: 0; width: 78%; max-width: 300px; background: var(--bg-card); border-right: 1px solid var(--border); z-index: 7; transform: translateX(-100%); transition: transform 280ms cubic-bezier(.2,.8,.2,1); display: flex; flex-direction: column; }
.rd-panel.open { transform: translateX(0); box-shadow: 6px 0 24px #0006; }
.rd-panel-head { padding: 14px 16px 10px; border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; justify-content: space-between; }
.rd-panel-head h3 { font-family: var(--font-zh); font-size: 14px; font-weight: 600; color: var(--ink); }
.rd-panel-head .sub { font-family: var(--font-mono); font-size: 9px; color: var(--ink-3); letter-spacing: 0.16em; text-transform: uppercase; margin-top: 2px; }
.rd-panel-body { flex: 1; overflow-y: auto; padding: 8px 8px 18px; }
.rd-panel-foot { padding: 10px 12px; border-top: 1px solid var(--border-soft); }
.rd-toc-item { display: flex; gap: 8px; padding: 8px 10px; border-radius: 6px; cursor: pointer; transition: background 110ms; font-family: var(--font-zh); font-size: 13px; color: var(--ink-2); line-height: 1.5; }
.rd-toc-item:hover { background: var(--bg-raised); }
.rd-toc-item.l1 { color: var(--ink); font-weight: 500; }
.rd-toc-item.l2 { padding-left: 22px; font-size: 12px; }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {hasDeckStage && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ════════════════════════════════════════════════
// Mnemos · Review (flashcard) + Quiz screens

const { useState: useStateRV } = React;

const ReviewScreen = ({ d, onBack, nav }) => {
  const [idx, setIdx] = useStateRV(0);
  const [flipped, setFlipped] = useStateRV(false);
  const [done, setDone] = useStateRV(false);
  const [stats, setStats] = useStateRV({ again: 0, hard: 0, good: 1, easy: 0, correct: 1 });

  const cards = [
    { front: "「编简成策」是什么？", back: "用麻绳或丝纶将简牍编联成册，是中国书籍最早的形制，盛行于先秦至汉魏。" },
    { front: "经折装的形制？", back: "将长卷按固定宽度反复折叠成方册，首末粘以硬质封面。源出佛经，盛行唐宋。" },
    { front: "线装书一般几针订？", back: "通常用四针眼或六针眼线钉；眼距取等分或天地略宽中间略密。" },
  ];
  const total = d?.due || 23;
  const card = cards[idx % cards.length];

  const rate = (kind) => {
    setStats(s => ({...s, [kind]: s[kind] + 1, correct: s.correct + (kind !== "again" ? 1 : 0)}));
    if (idx + 1 >= 3) { setDone(true); return; }
    setIdx(i => i + 1); setFlipped(false);
  };

  if (done) {
    return (
      <>
        <StatusBar/>
        <Topbar onBack={onBack} right={<button className="tb-btn"><Icon name="x" size={18}/></button>}/>

            <span className="sep">·</span>
            <span style={{color: "var(--good)"}}><span className="v" style={{color: "var(--good)"}}>{Math.round(stats.correct/(stats.again+stats.hard+stats.good+stats.easy)*100)}%</span> 正确率</span>
          </div>
          <div className="done-grid">
            <div className="cell again"><span className="num">{stats.again}</span>重来</div>

          </div>
        </div>
      </>
    );
  }

  return (
    <>
      <StatusBar/>
      <Topbar onBack={onBack} right={<button className="tb-btn"><Icon name="x" size={18}/></button>}/>
      <div className="rv-progress"><div className="bar" style={{width: ((idx+1)/3*100) + "%"}}/></div>

          <button className="star-btn" onClick={(e) => e.stopPropagation()}><Icon name="star" size={16}/></button>
          <div className="body">
            {!flipped ? (
              <div className="front-q">{card.front}</div>
            ) : (
              <>
                <div className="echo">{card.front}</div>
                <div className="reverso">REVERSO</div>

              </>
            )}
          </div>

        </div>

          <div className="rv-flip-hint">轻点翻面 · TAP TO FLIP</div>
        ) : (
          <div className="rate">
            <button className="rate-btn rate-again" onClick={() => rate("again")}>重来<span className="iv">&lt; 1m</span></button>
            <button className="rate-btn rate-hard" onClick={() => rate("hard")}>困难<span className="iv">6m</span></button>
            <button className="rate-btn rate-good" onClick={() => rate("good")}>记住<span className="iv">1d</span></button>
            <button className="rate-btn rate-easy" onClick={() => rate("easy")}>容易<span className="iv">4d</span></button>

};

// ─── Quiz ───
const QuizScreen = ({ s, onBack }) => {
  const data = QUIZ_DATA.s1;
  const [idx, setIdx] = useStateRV(0);
  const [picked, setPicked] = useStateRV(null);
  const [submitted, setSubmitted] = useStateRV(false);
  const [starred, setStarred] = useStateRV(false);
  const [score, setScore] = useStateRV({ correct: 0, total: 0 });
  const [done, setDone] = useStateRV(false);
  const q = data.questions[idx];

  const submit = () => {
    if (!picked) return;
    setSubmitted(true);
    setScore(sc => ({ correct: sc.correct + (picked === q.correct ? 1 : 0), total: sc.total + 1 }));
  };
  const next = () => {
    if (idx + 1 >= data.questions.length) { setDone(true); return; }
    setIdx(i => i + 1); setPicked(null); setSubmitted(false); setStarred(false);
  };

  if (done) {
    return (
      <>
        <StatusBar/>
        <Topbar onBack={onBack} right={<button className="tb-btn"><Icon name="x" size={18}/></button>}/>
        <div className="done-wrap">
          <div className="done-mark" style={{background: "var(--teal-soft)", borderColor: "var(--teal-line)", color: "var(--teal)"}}><Icon name="check" size={32} stroke={2}/></div>
          <div className="done-title">一组练毕</div>
          <div className="done-zh">{data.chapter}</div>
          <div className="done-stats">
            <span><span className="v">{score.total}</span> 题</span>
            <span className="sep">·</span>
            <span><span className="v" style={{color: "var(--good)"}}>{score.correct}</span> 正确</span>
            <span className="sep">·</span>
            <span><span className="v" style={{color: "var(--good)"}}>{Math.round(score.correct/score.total*100)}%</span> 正确率</span>
          </div>
          <div style={{display: "flex", gap: 8, width: "100%", marginTop: 18}}>
            <button className="btn btn-ghost btn-block">错题回顾</button>
            <button className="btn btn-primary btn-block" onClick={() => { setDone(false); setIdx(0); setPicked(null); setSubmitted(false); setScore({correct: 0, total: 0}); }}>再来一组</button>
          </div>
        </div>
      </>
    );
  }

  return (
    <>
      <StatusBar/>
      <Topbar onBack={onBack} right={
        <>
          <button className="tb-btn" onClick={() => setStarred(!starred)} style={{color: starred ? "var(--accent)" : null}}>
            <Icon name={starred ? "starf" : "star"} size={17}/>
          </button>
          <button className="tb-btn"><Icon name="more" size={17}/></button>
        </>
      }/>
      <div className="rv-progress"><div className="bar teal" style={{width: ((idx+1)/data.questions.length*100) + "%"}}/></div>
      <div className="rv-meta">
        <div className="crumb">{data.name}<span className="div">·</span>{data.chapter}</div>
        <div className="pos"><span className="now">{idx+1}</span> / {data.questions.length}</div>
      </div>
      <div className="rv-card-wrap">
        <div className="qa-card">
          <div className="corner">
            <span className="num">{idx+1}</span><span>· 选择题 · 单选</span>
          </div>
          <div className="qa-stem">{q.stem}</div>
          <div className="qa-options">
            {q.options.map(o => {
              let cls = "qa-opt";
              if (!submitted && picked === o.k) cls += " picked";
              if (submitted && o.k === q.correct) cls += " correct";
              if (submitted && picked === o.k && picked !== q.correct) cls += " wrong";
              if (submitted && o.k !== q.correct && picked !== o.k) cls += " faded";
              return (
                <button key={o.k} className={cls} disabled={submitted} onClick={() => setPicked(o.k)}>
                  <span className="qa-mark">{o.k}</span>
                  <span className="qa-text">{o.t}</span>
                </button>
              );
            })}
          </div>
          {submitted && (
            <div className="qa-explain">
              <strong>解析 · </strong>{q.explanation}
            </div>
          )}
        </div>
        <div style={{padding: "0"}}>
          {!submitted ? (
            <button className="btn btn-primary btn-block" disabled={!picked} onClick={submit}
              style={!picked ? {opacity: 0.4, cursor: "not-allowed"} : null}>
              提交答案
            </button>
          ) : (
            <button className="btn btn-primary btn-block" onClick={next}>
              {idx + 1 >= data.questions.length ? "完成 →" : "下一题 →"}
            </button>
          )}
        </div>
      </div>
    </>
  );
};

window.ReviewScreen = ReviewScreen; window.QuizScreen = QuizScreen;

</script>
<script type="text/babel">
/* eslint-disable */
// ════════════════════════════════════════════════

  const [highlights, setHighlights] = useStateRD([
    { id: "h1", paraIdx: 2, text: "瞬时速度", time: "今天 09:08" },
    { id: "h2", paraIdx: 3, text: "越来越小的区间上的平均变化率", time: "今天 09:11" },
    { id: "h3", paraIdx: 11, text: "乘积法则 (uv)' = u'v + uv'", time: "今天 09:36" },
  ]);
  const [flashIdx, setFlashIdx] = useStateRD(null);
  const [toast, setToast] = useStateRD(null);
  const [progress, setProgress] = useStateRD(0.62);
  const scrollRef = useRefRD(null);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 1400); };

  const onProseTap = (e) => {
    if (e.target.closest(".hl")) return; // selection click handled
    if (panel) { setPanel(null); return; }
    setChromeVisible(v => !v);
    setShowSettings(false);
  };

  // simulate selection — clicking a paragraph long shows fab
  const simulateSelection = (e, paraIdx) => {
    e.stopPropagation();
    const r = e.currentTarget.getBoundingClientRect();
    const phone = e.currentTarget.closest(".phone-screen-inner").getBoundingClientRect();
    setHlFab({ x: r.left + r.width/2 - phone.left, y: r.bottom - phone.top + 8, paraIdx, text: "选中文字示例片段" });

  const saveHighlight = () => {
    if (!hlFab) return;
    const newH = { id: "h" + Date.now(), paraIdx: hlFab.paraIdx, text: hlFab.text, time: "刚刚" };
    setHighlights(arr => [newH, ...arr]);
    setFlashIdx(hlFab.paraIdx);
    setTimeout(() => setFlashIdx(null), 600);
    setHlFab(null);
    showToast("已保存高亮");
    setPanel("highlight");
    setChromeVisible(true);
  };

  const fontSizes = { "小": 14, "中": 15, "大": 17 };

  return (

      {/* Prose */}
      <div ref={scrollRef} className="phone-screen-scroll" onClick={onProseTap} style={{padding: 0}}>
        <div className="reader-prose" style={{
          fontSize: fontSizes[fontSize] + "px",

          transition: "padding 240ms",
        }}>
          <h1>{doc.title}</h1>
          <div className="author">{doc.author}</div>
          {doc.paras.map((p, i) => {
            if (p.type === "h2") return <h2 key={i} id={p.id}>{p.text.replace(/^§ /, "").replace(/^[\d.]+\s*/, "")}</h2>;
            if (p.type === "quote") return <blockquote key={i}>{p.text}</blockquote>;
            if (p.type === "code") {
              return (
                <pre key={i} className="code-block">
                  <span className="code-block-head">{p.lang}</span>
                  {p.lines.map((ln, li) => (
                    <div key={li}><span className="ln">{li+1}</span>{ln.tokens.map((tk, ti) => tk.length === 0 ? null : <span key={ti} className={"tk-" + tk[0]}>{tk[1]}</span>)}</div>
                  ))}
                </pre>
              );
            }
            // paragraph with optional highlights
            let content = p.text;
            const parts = [];
            let rest = content;
            const hls = (p.hl || []).slice();
            // also include saved highlights for this paraIdx
            highlights.forEach(h => { if (h.paraIdx === i && !hls.includes(h.text)) hls.push(h.text); });

            const flash = flashIdx === i;
            // Render with each hl wrapped
            let nodes = [content];
            hls.forEach(h => {
              const next = [];
              nodes.forEach(n => {
                if (typeof n !== "string") { next.push(n); return; }
                const idx = n.indexOf(h);
                if (idx === -1) { next.push(n); return; }
                next.push(n.slice(0, idx));
                next.push(<span key={"hl-"+i+"-"+h.length+"-"+idx} className={"hl " + (flash ? "flash" : "")} onDoubleClick={(e)=>simulateSelection(e,i)}>{h}</span>);
                next.push(n.slice(idx + h.length));
              });
              nodes = next;
            });
            return (
              <p key={i} onContextMenu={(e)=>{e.preventDefault(); simulateSelection(e,i);}}>{nodes}</p>
            );
          })}
        </div>
      </div>

      {/* Highlight FAB */}
      {hlFab && (
        <button className="hl-fab" style={{left: hlFab.x, top: Math.min(hlFab.y, 600)}} onClick={saveHighlight}>
          <Icon name="highlight" size={12}/> 保存高亮 <span className="arr">↵</span>

      {/* Settings expansion */}
      {showSettings && chromeVisible && (

          <div className="lbl"><Icon name="spacing" size={10} style={{verticalAlign: "middle", marginRight: 4}}/> 行距</div>
          <div className="seg">{["紧","正常","松"].map(o => <button key={o} className={lineH===o?"on":""} onClick={()=>setLineH(o)}>{o}</button>)}</div>
          <div className="lbl"><Icon name="margin" size={10} style={{verticalAlign: "middle", marginRight: 4}}/> 边距</div>
          <div className="seg">{["窄","中","宽"].map(o => <button key={o} className={margin===o?"on":""} onClick={()=>setMargin(o)}>{o}</button>)}</div>
        </div>
      )}

      {/* Bottom toolbar */}
      <div className={"rd-toolbar " + (chromeVisible ? "" : "hidden")}>
        <button className={"rd-tool " + (panel === "toc" ? "on" : "")} onClick={()=>{setPanel(panel==="toc"?null:"toc"); setShowSettings(false);}}><Icon name="list" size={17}/></button>
        <button className={"rd-tool " + (panel === "highlight" ? "on" : "")} onClick={()=>{setPanel(panel==="highlight"?null:"highlight"); setShowSettings(false);}}><Icon name="highlight" size={17}/></button>
        <button className={"rd-tool " + (panel === "bookmark" ? "on" : "")} onClick={()=>{setPanel(panel==="bookmark"?null:"bookmark"); setShowSettings(false);}}><Icon name="bookmark" size={17}/></button>
        <button className={"rd-tool " + (showSettings ? "on" : "")} onClick={()=>setShowSettings(s=>!s)}><Icon name="settings" size={17}/></button>
      </div>

      {/* Side panels overlay */}
      <div className={"rd-overlay " + (panel ? "on" : "")} onClick={() => setPanel(null)}/>

      <div className={"rd-panel " + (panel === "toc" ? "open" : "")}>
        <div className="rd-panel-head">
          <div><h3>目录</h3><div className="sub">TABLE OF CONTENTS</div></div>
          <button className="tb-btn" onClick={() => setPanel(null)}><Icon name="x" size={16}/></button>
        </div>
        <div className="rd-panel-body">
          {doc.sections.map((s, i) => (
            <div key={i} className={"rd-toc-item l" + s.level + (s.id === "s4" ? " cur" : "")}>{s.title}</div>
          ))}
        </div>
      </div>

      <div className={"rd-panel " + (panel === "highlight" ? "open" : "")}>
        <div className="rd-panel-head">
          <div><h3>高亮 <span style={{color: "var(--ink-3)", fontWeight: 400, fontSize: 12}}>{highlights.length}</span></h3><div className="sub">HIGHLIGHTS</div></div>
          <button className="tb-btn" onClick={() => setPanel(null)}><Icon name="x" size={16}/></button>

};

<script type="text/babel">

// ════════════════════════════════════════════════
// Mnemos · Activity dashboard + Import + Settings + Search + PromptGuide

const { useState: useStateMS } = React;

// ─── Activity ───
const ActivityScreen = ({ onBack, layout = "rings" }) => {
  const days = DATA.activity;
  const today = days[days.length - 1];
  // level by total activity
  const lvl = (d) => {
    const t = d.recall + d.practice + d.readMin/3;
    if (t === 0) return 0;
    if (t < 8) return 1;
    if (t < 18) return 2;
    if (t < 30) return 3;
    return 4;
  };
  // last 35 days, oldest first
  const cells = days.slice(-35);
  const totals = days.reduce((a, d) => ({ recall: a.recall+d.recall, practice: a.practice+d.practice, readMin: a.readMin+d.readMin }), { recall: 0, practice: 0, readMin: 0 });

  // ring progress
  const r1 = Math.min(1, today.recall / DATA.targets.recall);
  const r2 = Math.min(1, today.practice / DATA.targets.practice);
  const r3 = Math.min(1, today.readMin / DATA.targets.readMin);
  const ring = (r, radius, color) => {
    const c = 2 * Math.PI * radius;
    return (<>
      <circle cx="100" cy="100" r={radius} fill="none" stroke="var(--bg-raised)" strokeWidth="14"/>
      <circle cx="100" cy="100" r={radius} fill="none" stroke={color} strokeWidth="14"
        strokeDasharray={`${c*r} ${c}`} strokeLinecap="round" transform="rotate(-90 100 100)"/>
    </>);
  };

  const dayLabels = ["一","二","三","四","五","六","日"];

              <svg className="act-ring-svg" viewBox="0 0 200 200">
                {ring(r1, 86, "var(--accent)")}
                {ring(r2, 66, "var(--teal)")}
                {ring(r3, 46, "var(--good)")}

              </svg>
            </div>
            <div className="act-ring-stats">
              <div className="col"><span className="dot recall"/><span className="num">{today.recall}</span><span className="lab">RECALL</span><span className="zh">记忆 · {DATA.targets.recall}</span></div>
              <div className="col"><span className="dot practice"/><span className="num">{today.practice}</span><span className="lab">PRACTICE</span><span className="zh">练习 · {DATA.targets.practice}</span></div>

            </div>
          </div>
        )}

        {layout !== "rings" && (
          <div style={{background: "var(--bg-card)", border: "1px solid var(--border-soft)", borderRadius: 14, padding: "16px 14px"}}>
            <div style={{display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6}}>
              <div className="section-title" style={{flex: "0 0 auto", paddingRight: 12}}>近 5 周 · LAST 5 WEEKS</div>
              <div style={{fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--ink-3)", letterSpacing: 0.08}}>{days.filter(d => lvl(d) > 0).length} 天活跃</div>

                {dayLabels.map(l => <div key={l} style={{height: "calc((100% - 18px)/7)", minHeight: 14, fontFamily: "var(--font-zh)", fontSize: 9, color: "var(--ink-3)", display: "flex", alignItems: "center"}}>{l}</div>)}
              </div>
              <div className="heatmap" style={{flex: 1, gridTemplateColumns: "repeat(5, 1fr)", gap: 4}}>
                {/* render as 5 weeks of 7 days each, columns = weeks */}
                {[0,1,2,3,4,5,6].map(dow => (
                  cells.map((d, i) => i % 7 === dow ? (
                    <div key={`${dow}-${i}`} className={"heat-cell l" + lvl(d) + (d === today ? " today" : "")} style={{gridRow: dow + 1, gridColumn: Math.floor(i/7) + 1}} title={`Day ${i}`}/>
                  ) : null).filter(Boolean)
                ))}

            </div>
            <div className="heat-legend" style={{justifyContent: "flex-end", marginTop: 8}}>
              <span>较少</span>
              <div className="lvl heat-cell"/>
              <div className="lvl heat-cell l1"/>

            <div className="col"><span className="dot practice"/><span className="num">{totals.practice}</span><span className="lab">QUESTIONS</span><span className="zh">练习题</span></div>
            <div className="col"><span className="dot read"/><span className="num">{Math.round(totals.readMin/60)}<span style={{fontSize: 11, color: "var(--ink-3)", marginLeft: 2}}>h</span></span><span className="lab">READING</span><span className="zh">阅读时长</span></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "darkWarmth": 250,
  "tabPlacement": "top",
  "activityLayout": "rings",
  "showAllScreens": true
}/*EDITMODE-END*/;

// Per-phone navigation hook
const usePhoneNav = (initial = "home") => {
  const [stack, setStack] = useState([{ scr: initial, ctx: null }]);
  const cur = stack[stack.length - 1];
  const nav = (scr, ctx) => setStack(s => [...s, { scr, ctx: ctx || null }]);
  const back = () => setStack(s => s.length > 1 ? s.slice(0, -1) : s);
  const reset = (scr) => setStack([{ scr, ctx: null }]);
  return { cur, nav, back, reset };
};

// Render a screen given a route
const ScreenRouter = ({ phoneId, initial, theme, onTheme, tabPlacement }) => {
  const { cur, nav, back, reset } = usePhoneNav(initial);
  const [tab, setTab] = useState(initial === "home-recall" ? "recall" : initial === "home-reading" ? "reading" : "practice");

  let inner;
  switch (cur.scr) {
    case "home":
    case "home-practice":
    case "home-recall":
    case "home-reading":
      inner = <HomeScreen tab={tab} setTab={setTab} nav={nav} theme={theme} onTheme={onTheme} tabPlacement={tabPlacement}/>;
      break;
    case "deckdetail":
      inner = <DeckDetail d={cur.ctx || DATA.decks[0]} nav={nav} onBack={back}/>;
      break;
    case "setdetail":
      inner = <SetDetail s={cur.ctx || DATA.subjects[0]} nav={nav} onBack={back}/>;
      break;
    case "collectiondetail":
      inner = <CollectionDetail c={cur.ctx || DATA.collections[0]} nav={nav} onBack={back}/>;
      break;
    case "review":
      inner = <ReviewScreen d={cur.ctx} onBack={back} nav={nav}/>;

      inner = <QuizScreen s={cur.ctx} onBack={back}/>;

      inner = <SettingsScreen onBack={back} theme={theme} onTheme={onTheme} onActivity={() => nav("activity")}/>;

      inner = <SearchScreen onBack={back}/>;

      break;
    default:
      inner = <HomeScreen tab={tab} setTab={setTab} nav={nav} theme={theme} onTheme={onTheme} tabPlacement={tabPlacement}/>;

};

                <div className="section-marker">
                  <span className="num">§ {sec.num}</span>
                  <span className="ttl">{sec.ttl}</span>
                  <span className="line"/>
                  <span className="desc">{sec.desc}</span>
                </div>
                {phones.map((p, i) => (
                  <Phone
                    key={p.id}
                    label={p.label}
                    num={i + 1}
                    theme={themeOf(p)}
                    onTheme={() => toggleTheme(p.id)}
                    screenLabel={p.label}
                  >
                    <ScreenRouter
                      phoneId={p.id}
                      initial={p.scr}
                      theme={themeOf(p)}
                      onTheme={() => toggleTheme(p.id)}
                      tabPlacement={tweaks.tabPlacement}
                    />
                  </Phone>
                ))}
              </div>
            </React.Fragment>
          );
        })}

        <div style={{maxWidth: 1800, margin: "60px auto 0", padding: "32px 8px 0", borderTop: "1px solid var(--stage-rule, oklch(86% 0.018 80))", display: "flex", justifyContent: "space-between", alignItems: "flex-end", gap: 24, flexWrap: "wrap"}}>
          <div>
            <div style={{fontFamily: "var(--font-disp)", fontStyle: "italic", color: "#B86A30", fontSize: 18}}>memoria principium</div>
            <div style={{fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--stage-ink-3, #7a6e5c)", letterSpacing: 0.16, textTransform: "uppercase", marginTop: 4}}>记忆乃万事之始</div>
          </div>
          <div style={{fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--stage-ink-3, #7a6e5c)", letterSpacing: 0.14, textAlign: "right", lineHeight: 1.7}}>
            <div>HUE · 80 (PARCHMENT) · {tweaks.darkWarmth} (DARK)</div>
            <div>OKLCH · 4 SPINE COLORS · 6 CODE TOKENS</div>
            <div>NOTO SERIF SC · INSTRUMENT SERIF · INTER · JETBRAINS MONO</div>
          </div>
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection title="深色模式色调 · DARK WARMTH">
          <TweakSlider label="hue" value={tweaks.darkWarmth} min={0} max={280} step={5}
            onChange={(v) => setTweak("darkWarmth", v)}
            help="35 = 温暖砚墨 (推荐)。250 = v1.1.0 冷蓝灰。220-230 = 折中" />
        </TweakSection>
        <TweakSection title="标签栏位置 · TAB PLACEMENT">
          <TweakRadio value={tweaks.tabPlacement} options={[{value:"top",label:"顶部"},{value:"bottom",label:"底部"}]} onChange={(v)=>setTweak("tabPlacement", v)}/>
        </TweakSection>
        <TweakSection title="活动仪表 · ACTIVITY LAYOUT">
          <TweakSelect value={tweaks.activityLayout} options={[
            {value:"both", label:"环 + 热力图"},
            {value:"rings", label:"仅三色环"},
            {value:"heatmap", label:"仅热力图"},
          ]} onChange={(v)=>setTweak("activityLayout", v)}/>
        </TweakSection>
        <TweakSection title="显示范围">
          <TweakToggle label="全部 18 屏" value={tweaks.showAllScreens} onChange={(v)=>setTweak("showAllScreens", v)}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
};
